<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Simple Calculator</title>
  <style>
    body {
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    .calculator {
      background: #fff;
      padding: 2em;
      border-radius: 15px;
      box-shadow: 0 6px 32px rgba(0,0,0,0.15);
      width: 320px;
      max-width: 95vw;
    }
    .calculator input {
      width: 100%;
      border: none;
      background: #e9ecef;
      border-radius: 8px;
      padding: 1em;
      font-size: 1.5em;
      margin-bottom: 1em;
      text-align: right;
      outline: none;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.7em;
    }
    button {
      padding: 1em;
      font-size: 1.2em;
      border: none;
      border-radius: 8px;
      background: #f0f0f0;
      transition: background 0.2s;
      cursor: pointer;
    }
    button.operator { background: #6c63ff; color: #fff; }
    button.equal { background: #ffb84c; color: #fff; grid-column: span 2; }
    button.clear { background: #ff4c4c; color: #fff; }
    button:active { background: #dddddd; }
    @media (max-width: 480px) {
      .calculator { padding: 1em; font-size: 0.9em; width: 100%; }
      button { font-size: 1em; }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" id="display" disabled>
    <div class="buttons">
      <button onclick="append('7')">7</button>
      <button onclick="append('8')">8</button>
      <button onclick="append('9')">9</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button onclick="append('4')">4</button>
      <button onclick="append('5')">5</button>
      <button onclick="append('6')">6</button>
      <button class="operator" onclick="append('*')">×</button>

      <button onclick="append('1')">1</button>
      <button onclick="append('2')">2</button>
      <button onclick="append('3')">3</button>
      <button class="operator" onclick="append('-')">−</button>

      <button onclick="append('0')">0</button>
      <button onclick="append('.')">.</button>
      <button class="equal" onclick="calculate()">=</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="clear" onclick="clearDisplay()" style="grid-column: span 4;">C</button>
    </div>
  </div>
  <script>
    const display = document.getElementById('display');
    function append(value) {
      display.value += value;
    }
    function clearDisplay() {
      display.value = '';
    }
    function calculate() {
      try {
        display.value = eval(display.value.replace('÷', '/').replace('×', '*'));
      } catch (e) {
        display.value = 'Error';
      }
    }
  </script>
</body>
</html>
